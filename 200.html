<!DOCTYPE html>
<html>

<head>
    <title>AICA AI - Local</title>
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <script src="config.local-working.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --bg-input: #2f2f2f;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --border-color: rgba(255, 255, 255, 0.1);
            --hover-color: #2f2f2f;
            --msg-user: #2f2f2f;
            --msg-ai: transparent;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
            display: flex;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, width 0.3s ease;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar.collapsed {
            width: 0;
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
        }

        .sidebar-toggle {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
        }

        .sidebar-toggle:hover {
            background: var(--hover-color);
            color: var(--text-primary);
        }

        .new-chat-btn {
            margin: 0 12px 12px;
            padding: 10px 12px;
            background: transparent;
            color: var(--text-primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s ease;
        }

        .new-chat-btn:hover {
            background: var(--hover-color);
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .top-left-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .open-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: none;
            /* hidden by default when sidebar is open */
        }

        .open-sidebar-btn:hover {
            background: var(--hover-color);
            color: var(--text-primary);
        }

        .sidebar.collapsed~.main-content .open-sidebar-btn {
            display: flex;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .model-dropdown {
            background: transparent;
            color: var(--text-primary);
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            padding-right: 20px;
            font-family: inherit;
        }

        .model-dropdown:focus {
            outline: none;
        }

        .model-dropdown option {
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
        }

        .model-selector::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-30%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid var(--text-secondary);
            pointer-events: none;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10B981;
        }

        .status-dot.connecting {
            background: #F59E0B;
            animation: pulse 1.5s infinite;
        }

        .status-dot.error {
            background: #EF4444;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 80px 24px 120px;
            /* space for header and input */
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .welcome-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 32px;
        }

        .messages-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user-message {
            justify-content: flex-end;
        }

        .message-content {
            display: flex;
            gap: 16px;
            max-width: 85%;
        }

        .message.user-message .message-content {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .user-avatar {
            background: #000;
            /* Or any contrasting color for user */
            color: #fff;
        }

        .ai-avatar {
            background: #fff;
            color: #000;
        }

        .ai-avatar svg {
            width: 20px;
            height: 20px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
        }

        .user-message .message-bubble {
            background: var(--msg-user);
            color: var(--text-primary);
            border-top-right-radius: 4px;
        }

        .ai-message .message-bubble {
            background: var(--msg-ai);
            color: var(--text-primary);
            padding: 8px 0;
            /* Remove side padding for AI like ChatGPT */
        }

        .ai-message .message-content {
            width: 100%;
        }

        .system-message {
            justify-content: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .error-message .message-bubble {
            color: #EF4444;
        }

        /* Input Area Styles */
        .input-area {
            position: absolute;
            bottom: 32px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 24px;
            background: linear-gradient(180deg, transparent, var(--bg-main) 30%);
        }

        .input-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-input);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .attach-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .attach-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .message-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 8px 0;
            font-family: inherit;
            resize: none;
            max-height: 200px;
            outline: none;
        }

        .message-input::placeholder {
            color: #8e8e8e;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .send-btn-icon {
            display: none;
            /* Show only when typing */
            background: var(--text-primary);
            color: var(--bg-main);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .send-btn-icon:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 16px 0;
            width: 100%;
            max-width: 800px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 1;
            }

            30% {
                transform: translateY(-4px);
                opacity: 0.5;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 20;
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
            }
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <!-- OpenAI-like SVG icon or custom AICA icon -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg>
                </div>
            </div>
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="Close sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
        </div>

        <button class="new-chat-btn" onclick="startNewChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            New chat
        </button>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="top-left-controls">
                <button class="open-sidebar-btn" onclick="toggleSidebar()" title="Open sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                    </svg>
                </button>
                <div class="model-selector">
                    <select id="modelSelect" class="model-dropdown">
                        <option value="Qwen">Qwen</option>
                        <option value="KIMI">KIMI</option>
                        <option value="Qwen3-14B">Qwen3-14B</option>
                        <option value="Qwen3.5-397B-A17B-Q8">Qwen3.5-397B-A17B-Q8</option>
                    </select>
                </div>
            </div>

            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="status">Ready</span>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome-message" id="welcomeMessage">
                <div class="welcome-title">Where should we begin?</div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- Messages will be added here -->
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <button class="attach-btn" title="Attach file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <input type="text" id="userInput" class="message-input" placeholder="Ask anything">

                <button class="action-btn" id="voiceBtn">
                    
                    Send
                </button>

                <button class="send-btn-icon" id="sendBtnIcon" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Disable F12 and other developer tools shortcuts
        document.addEventListener('keydown', function(e) {
            // F12 key
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Chrome/Edge DevTools)
            if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J (Chrome Console)
            if (e.ctrlKey && e.shiftKey && e.key === 'J') {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+C (Chrome Inspector)
            if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (View Source)
            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                return false;
            }
        });

        // Disable right-click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Clear console periodically
        setInterval(() => {
            if (typeof console.clear === 'function') {
                console.clear();
            }
        }, 1000);

        // Override console methods
        const originalConsole = {
            log: console.log,
            warn: console.warn,
            error: console.error,
            info: console.info,
            debug: console.debug
        };

        // Disable console output
        console.log = function() {};
        console.warn = function() {};
        console.error = function() {};
        console.info = function() {};
        console.debug = function() {};

        // Global variables
        let modelConfigs;
        let config;
        let currentModel = 'Qwen';
        let conversationHistory = [];
        let hasMessages = false;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // Initialize app
        async function initializeApp() {
            try {
                let retryCount = 0;
                const maxRetries = 10;

                while (retryCount < maxRetries) {
                    if (typeof window._0xgetModelConfig === 'function') {
                        modelConfigs = window._0xgetModelConfig();
                        config = modelConfigs[currentModel];

                        if (!config || !config.apiBase) {
                            throw new Error('AI model configuration not loaded properly');
                        }

                        setupEventListeners();
                        await testConnectivity();
                        return;
                    }
                    retryCount++;
                    await new Promise(resolve => setTimeout(resolve, 200));
                }
                throw new Error('Configuration loading timeout');
            } catch (error) {
                console.error('App initialization error:', error);
                showError(`Failed to initialize app: ${error.message}`);
            }
        }

        // Test connectivity
        async function testConnectivity() {
            const statusDot = document.getElementById('statusDot');
            const status = document.getElementById('status');

            statusDot.className = 'status-dot connecting';
            status.textContent = 'Testing...';

            try {
                const response = await fetch(`${window.location.origin}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [{ role: 'user', content: 'test' }]
                    })
                });

                if (response.ok) {
                    statusDot.className = 'status-dot';
                    status.textContent = 'Ready';
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                statusDot.className = 'status-dot error';
                status.textContent = 'Offline';
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            const userInput = document.getElementById('userInput');
            const voiceBtn = document.getElementById('voiceBtn');
            const sendBtnIcon = document.getElementById('sendBtnIcon');

            userInput.addEventListener('input', (e) => {
                if (e.target.value.trim().length > 0) {
                    voiceBtn.style.display = 'none';
                    sendBtnIcon.style.display = 'flex';
                } else {
                    voiceBtn.style.display = 'flex';
                    sendBtnIcon.style.display = 'none';
                }
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            const modelSelect = document.getElementById('modelSelect');
            modelSelect.addEventListener('change', (e) => {
                switchModel(e.target.value);
            });
        }

        // Switch AI model
        function switchModel(newModel) {
            if (modelConfigs[newModel]) {
                currentModel = newModel;
                config = modelConfigs[currentModel];

                const statusDot = document.getElementById('statusDot');
                const status = document.getElementById('status');
                statusDot.className = 'status-dot connecting';
                status.textContent = 'Switching...';

                testConnectivity();
            }
        }

        // Start new chat
        function startNewChat() {
            conversationHistory = [];
            hasMessages = false;

            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = '';

            const welcomeMsg = document.getElementById('welcomeMessage');
            welcomeMsg.style.display = 'flex';

            testConnectivity();

            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        // Add message to DOM
        function addMessage(content, type) {
            if (!hasMessages) {
                const welcomeMsg = document.getElementById('welcomeMessage');
                if (welcomeMsg) welcomeMsg.style.display = 'none';
                hasMessages = true;
            }

            const messagesContainer = document.getElementById('messagesContainer');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${type}-avatar`;

            if (type === 'ai') {
                avatar.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;
            } else if (type === 'user') {
                avatar.textContent = 'U';
            }

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            // Simple new line replacement
            bubble.innerHTML = content.replace(/\n/g, '<br>');

            if (type === 'user') {
                messageContent.appendChild(bubble);
            } else {
                messageContent.appendChild(avatar);
                messageContent.appendChild(bubble);
            }

            messageDiv.appendChild(messageContent);
            messagesContainer.appendChild(messageDiv);

            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Send message to AI
        async function sendMessage() {
            if (!config) return;

            const userInput = document.getElementById('userInput');
            const sendBtnIcon = document.getElementById('sendBtnIcon');
            const voiceBtn = document.getElementById('voiceBtn');
            const typingIndicator = document.getElementById('typingIndicator');
            const chatArea = document.getElementById('chatArea');

            const message = userInput.value.trim();
            if (!message) return;

            // Reset UI State
            userInput.value = '';
            voiceBtn.style.display = 'flex';
            sendBtnIcon.style.display = 'none';
            sendBtnIcon.disabled = true;
            typingIndicator.style.display = 'flex';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                addMessage(message, 'user');

                const messages = [
                    ...conversationHistory,
                    { role: 'user', content: message }
                ];

                const response = await fetch(`${window.location.origin}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: messages
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                addMessage(aiResponse, 'ai');

                conversationHistory.push({ role: 'user', content: message });
                conversationHistory.push({ role: 'assistant', content: aiResponse });

            } catch (error) {
                addMessage(`Error connecting to local AI server.`, 'system');
                console.error(error);
            } finally {
                sendBtnIcon.disabled = false;
                typingIndicator.style.display = 'none';
                userInput.focus();
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        function showError(message) {
            addMessage(`System Error: ${message}`, 'system');
        }

        window.addEventListener('load', initializeApp);
    </script>
