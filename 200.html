<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant - Modern Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #FFFFFF;
            color: #1A1A1A;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: #FFFFFF;
        }

        .sidebar {
            width: 260px;
            background: #FAFBFC;
            border-right: 1px solid #E5E7EB;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #E5E7EB;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #1A1A1A;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 14px;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
        }

        .new-chat-btn {
            margin: 16px;
            padding: 12px;
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            background: #2A2A2A;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #E5E7EB;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #FFFFFF;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-dropdown {
            background: #FFFFFF;
            color: #1A1A1A;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 160px;
        }

        .model-dropdown:hover {
            border-color: #9CA3AF;
        }

        .model-dropdown:focus {
            outline: none;
            border-color: #1A1A1A;
            box-shadow: 0 0 0 2px rgba(26, 26, 26, 0.1);
        }

        .chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #F3F4F6;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 3px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }

        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            color: #6B7280;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 16px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 32px;
        }

        .message {
            margin: 16px 0;
            max-width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .user-message .message-content {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }

        .user-avatar {
            background: #1A1A1A;
            color: #FFFFFF;
        }

        .ai-avatar {
            background: #F3F4F6;
            color: #1A1A1A;
            border: 1px solid #E5E7EB;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-message .message-bubble {
            background: #1A1A1A;
            color: #FFFFFF;
            border-bottom-right-radius: 4px;
        }

        .ai-message .message-bubble {
            background: #F3F4F6;
            color: #1A1A1A;
            border: 1px solid #E5E7EB;
            border-bottom-left-radius: 4px;
        }

        .system-message {
            text-align: center;
            padding: 12px;
            margin: 16px 0;
        }

        .system-message .message-bubble {
            background: #FEF3C7;
            color: #92400E;
            border: 1px solid #FDE68A;
            font-size: 13px;
            border-radius: 6px;
            display: inline-block;
            max-width: 80%;
        }

        .error-message .message-bubble {
            background: #FEF2F2;
            color: #DC2626;
            border: 1px solid #FECACA;
        }

        .input-area {
            padding: 24px;
            background: #FFFFFF;
            border-top: 1px solid #E5E7EB;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            max-width: 800px;
            margin: 0 auto;
        }

        .message-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #D1D5DB;
            border-radius: 12px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            background: #FFFFFF;
            color: #1A1A1A;
            transition: all 0.2s ease;
        }

        .message-input:focus {
            outline: none;
            border-color: #1A1A1A;
            box-shadow: 0 0 0 2px rgba(26, 26, 26, 0.1);
        }

        .send-button {
            padding: 12px 20px;
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .send-button:hover:not(:disabled) {
            background: #2A2A2A;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            margin: 16px 0;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #6B7280;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 1; }
            30% { transform: translateY(-4px); opacity: 0.5; }
        }

        .typing-text {
            font-size: 14px;
            color: #6B7280;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .main-content {
                max-width: 100%;
            }
            
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">AI</div>
                    <div class="logo-text">AI Assistant</div>
                </div>
            </div>
            
            <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        </div>
        
        <div class="main-content">
            <div class="header">
                <div class="header-title">AI Assistant</div>
                <div class="model-selector">
                    <select id="modelSelect" class="model-dropdown">
                        <option value="Qwen-Local">Qwen-Local</option>
                        <option value="KIMI-Local">KIMI-Local</option>
                        <option value="Qwen3-14B-Local">Qwen3-14B-Local</option>
                        <option value="GLM-4.7-Local">GLM-4.7-Local</option>
                        <option value="step-3.5-flash-Local">step-3.5-flash-Local</option>
                        <option value="GLM-4.7-Flash-REAP-23B-A3B-Q4_K_M-Local">GLM-4.7-Flash-REAP</option>
                        <option value="ggml-org-gpt-oss-120b">ggml-org-gpt-oss-120b</option>
                    </select>
                </div>
            </div>
            
            <div class="chat-area" id="chatArea">
                <div class="welcome-message">
                    <div class="welcome-title">Welcome to AI Assistant</div>
                    <div class="welcome-subtitle">How can I help you today?</div>
                </div>
                
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <span class="typing-text">AI is thinking...</span>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="userInput" class="message-input" placeholder="Type your message...">
                    <button class="send-button" id="sendButton" onclick="sendMessage()">
                        <span>Send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let modelConfigs;
        let config;
        let currentModel = 'Qwen-Local';
        let conversationHistory = [];
        let hasMessages = false;

        // Initialize app
        async function initializeApp() {
            try {
                // Load AI model configuration
                if (typeof window._0xgetModelConfig === 'function') {
                    modelConfigs = window._0xgetModelConfig();
                    config = modelConfigs[currentModel];
                    
                    if (!config || !config.apiBase) {
                        throw new Error('AI model configuration not loaded properly');
                    }
                    
                    // Setup event listeners
                    setupEventListeners();
                    
                    console.log('AI Chat App initialized successfully');
                } else {
                    console.error('AI configuration not available');
                    setTimeout(initializeApp, 1000);
                }
            } catch (error) {
                console.error('App initialization error:', error);
                showError('Failed to initialize app. Please refresh the page.');
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Enter key handler for chat input
            const userInput = document.getElementById('userInput');
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Model change handler
            const modelSelect = document.getElementById('modelSelect');
            modelSelect.addEventListener('change', (e) => {
                switchModel(e.target.value);
            });
        }

        // Switch AI model
        function switchModel(newModel) {
            if (modelConfigs[newModel]) {
                currentModel = newModel;
                config = modelConfigs[currentModel];
                addMessage(`SYSTEM: Switched to ${newModel} model. Conversation preserved.`, 'system');
            }
        }

        // Start new chat
        function startNewChat() {
            conversationHistory = [];
            hasMessages = false;
            showWelcomeScreen();
        }

        // Show welcome screen
        function showWelcomeScreen() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="welcome-message">
                    <div class="welcome-title">Welcome to AI Assistant</div>
                    <div class="welcome-subtitle">How can I help you today?</div>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <span class="typing-text">AI is thinking...</span>
                </div>
            `;
        }

        // Add message to chat
        function addMessage(content, type) {
            if (!hasMessages) {
                const welcomeMsg = document.querySelector('.welcome-message');
                if (welcomeMsg) {
                    welcomeMsg.style.display = 'none';
                }
                hasMessages = true;
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${type}-avatar`;
            if (type === 'ai') {
                avatar.textContent = 'AI';
            }
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            
            messageContent.appendChild(avatar);
            messageContent.appendChild(bubble);
            messageDiv.appendChild(messageContent);
            
            const chatArea = document.getElementById('chatArea');
            const typingIndicator = document.getElementById('typingIndicator');
            chatArea.insertBefore(messageDiv, typingIndicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Send message to AI
        async function sendMessage() {
            if (!config) return;

            const userInput = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const typingIndicator = document.getElementById('typingIndicator');
            const message = userInput.value.trim();

            if (!message) return;

            // Disable input and show typing indicator
            userInput.value = '';
            sendButton.disabled = true;
            typingIndicator.style.display = 'flex';

            try {
                // Add user message
                addMessage(message, 'user');

                // Send to AI
                const messages = [
                    ...conversationHistory,
                    { role: 'user', content: message }
                ];

                const response = await fetch(`${config.apiBase}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-local'
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: messages,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Add AI response
                addMessage(aiResponse, 'ai');

                // Update conversation history
                conversationHistory.push({ role: 'user', content: message });
                conversationHistory.push({ role: 'assistant', content: aiResponse });

            } catch (error) {
                addMessage(`Connection error: ${error.message}. Please check if AI server is running.`, 'error');
            } finally {
                // Re-enable input and hide typing indicator
                sendButton.disabled = false;
                typingIndicator.style.display = 'none';
                userInput.focus();
            }
        }

        // Show error message
        function showError(message) {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="welcome-message">
                    <div class="welcome-title">Error</div>
                    <div class="welcome-subtitle">${message}</div>
                    <button class="send-button" onclick="location.reload()">Refresh Page</button>
                </div>
            `;
        }

        // Initialize app when page loads
        window.addEventListener('load', initializeApp);

        // Disable developer tools
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });

        // Block right-click
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
    </script>
</body>
</html>
